<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quarto</title>
    <script>
        /*Áreas de Figuras Planas*/

        alert("VAMOS CALCULAR A ÁREA DO RETÂNGULO!");
        var base_retangulo = prompt("Qual a base do retângulo?");
        var altura_retangulo = prompt("Qual a altura do retângulo?");
        alert("A area do seu retângulo é " + base_retangulo*altura_retangulo);
        
        alert("VAMOS CALCULAR A ÁREA DO QUADRADO!");
        var lado_quadrado = prompt("Qual o lado do quadrado?");
        alert("A area do quadrado é " + lado_quadrado*lado_quadrado);

        alert("VAMOS CALCULAR A ÁREA DO LOSANGO!");
        var diagonal_maior = prompt("Qual a diagonal maior do losango?");
        var diagonal_menor = prompt("Qual a diagonal menor do losango?");
        alert("A área do losango é " + (diagonal_maior*diagonal_menor)/2);

        alert("VAMOS CALCULAR A ÁREA DO TRAPÉZIO!");
        var base_maior = prompt("Qual a maior base do trpézio?");
        var base_menor = prompt("Qual a menor base do trpézio?");
        var altura_trapezio = prompt("Qual a altura do trapezio?")
        alert("A área do trapézio é " + ((base_maior+base_menor)/altura_trapezio)/2);

        alert("VAMOS CALCULAR A ÁREA DO PARALELOGRAMO!");
        var base_paralelogramo = prompt("Qual a base do paralelogramo?");
        var altura_paralelogramo = prompt("Qual a altura do paralelogramo?");
        alert("A área do paralelogramo é " + base_paralelogramo*altura_paralelogramo);

        alert("VAMOS CALCULAR A ÁREA DO TRIÂNGULO!");
        var base_triangulo = prompt("Qual a base do triângulo?");
        var altura_triangulo = prompt("Qual a altura do triângulo?");
        alert("A área do triângulo é " + (base_triangulo*altura_triangulo)/2);

        alert("VAMOS CALCULAR A ÁREA DO CIRCULO!");
        var raio = prompt("Qual o raio do circulo?");
        alert("A área do circulo é " + 3,14 * (raio**2));


    </script>
</head>

</html>
